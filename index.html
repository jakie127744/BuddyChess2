<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuddyChess2 - Play Chess with AI Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>BuddyChess2</h1>
            <div class="controls">
                <select id="piece-set-selector">
                    <option value="burnett">Chess Burnett</option>
                    <option value="merida">Merida</option>
                    <option value="alpha">Alpha</option>
                    <option value="neo">Neo</option>
                </select>
                <button id="flip-board">Flip Board</button>
                <button id="undo-move">Undo</button>
                <button id="new-game">New Game</button>
            </div>
        </header>

        <div class="game-area">
            <!-- Column 1: Engine Info & Controls -->
            <div class="column-left">
                <div class="engine-panel">
                    <h3>Engine Analysis</h3>
                    <div class="eval-bar-container">
                        <div id="eval-bar-fill" class="eval-bar-fill"></div>
                        <div class="eval-bar-marker"></div>
                    </div>
                    <div id="eval-text" class="eval-text">0.0</div>
                    <div class="engine-info">
                        <div class="info-row">
                            <span class="label">Depth:</span>
                            <span id="engine-depth">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Nodes:</span>
                            <span id="engine-nodes">-</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Best Move:</span>
                            <span id="best-move">-</span>
                        </div>
                    </div>
                </div>
                
                <div class="game-info">
                    <h3>Game Info</h3>
                    <div class="info-row">
                        <span class="label">Opening:</span>
                        <span id="opening-name">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">ECO:</span>
                        <span id="eco-code">-</span>
                    </div>
                </div>

                <div class="actions-panel">
                    <h3>Actions</h3>
                    <button class="action-btn" id="copy-fen">Copy FEN</button>
                    <button class="action-btn" id="copy-pgn">Copy PGN</button>
                    <button class="action-btn" id="download-pgn">Download PGN</button>
                </div>
            </div>

            <!-- Column 2: Chess Board -->
            <div class="column-center">
                <div class="player-info player-top" id="player-black-info">
                    <div class="player-avatar black-avatar">♚</div>
                    <div class="player-details">
                        <span class="player-name">Black</span>
                        <span class="player-rating" id="black-rating">-</span>
                    </div>
                    <div class="captured-pieces captured-by-black" id="captured-by-black"></div>
                </div>
                
                <div class="board-wrapper">
                    <div id="chessboard" class="chessboard"></div>
                    <div class="board-coordinates files-bottom">
                        <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                    <div class="board-coordinates ranks-left">
                        <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
                    </div>
                </div>
                
                <div class="player-info player-bottom" id="player-white-info">
                    <div class="player-avatar white-avatar">♔</div>
                    <div class="player-details">
                        <span class="player-name">White</span>
                        <span class="player-rating" id="white-rating">-</span>
                    </div>
                    <div class="captured-pieces captured-by-white" id="captured-by-white"></div>
                </div>
            </div>

            <!-- Column 3: Move History & Status -->
            <div class="column-right">
                <div class="status-panel">
                    <h3>Game Status</h3>
                    <p id="status-text" class="status-text">White to move</p>
                    <div id="game-result" class="game-result"></div>
                </div>
                
                <div class="move-history">
                    <h3>Move History</h3>
                    <div id="move-list" class="move-list"></div>
                </div>
                
                <div class="pgn-display">
                    <h3>PGN</h3>
                    <div id="pgn-text" class="pgn-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuddyChess2 - Play Chess Online</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>♔ BuddyChess2 ♚</h1>
            <p class="subtitle">Play Chess Online</p>
        </header>

        <div class="game-container">
            <div class="player-info top-player">
                <span class="player-name">Black</span>
                <span id="black-captured" class="captured-pieces"></span>
            </div>

            <div id="chessboard" class="chessboard"></div>

            <div class="player-info bottom-player">
                <span class="player-name">White</span>
                <span id="white-captured" class="captured-pieces"></span>
            </div>
        </div>

        <div class="game-status">
            <span id="status">White's turn</span>
        </div>

        <div class="controls">
            <button id="new-game" class="btn">New Game</button>
            <button id="flip-board" class="btn">Flip Board</button>
            <button id="undo-move" class="btn">Undo Move</button>
            <select id="piece-set-selector" class="piece-selector">
                <!-- Options will be populated by JavaScript -->
            </select>
        </div>

        <div class="move-history">
            <h3>Move History</h3>
            <div id="moves" class="moves-list"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

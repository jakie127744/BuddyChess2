<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BuddyChess2 - Advanced Review</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
* { box-sizing: border-box; }
html { font-size: 150%; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #18181b; }
::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #52525b; }

/* Board */
#board {
  display: grid; grid-template-columns: repeat(8,1fr); grid-template-rows: repeat(8,1fr);
  width: 100%; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden;
  box-shadow: 0 12px 36px -8px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,0.04);
  user-select: none; position: relative;
}
.square { position: relative; display: flex; align-items: center; justify-content: center; }
.square.light { background: #ebecd0; }
.square.dark  { background: #6f9152; }
.square.sq-highlight-from { background-color: rgba(255,221,0,0.45) !important; }
.square.sq-highlight-to   { background-color: rgba(255,221,0,0.60) !important; }
.square.sq-selected::before { content:''; position:absolute; inset:0; box-shadow:inset 0 0 0 3px rgba(56,189,248,0.85); pointer-events:none; }
.square.sq-check { background: radial-gradient(circle, rgba(255,40,40,0.95) 0%, rgba(255,40,40,0.55) 45%, rgba(255,40,40,0) 75%) !important; }
.square.move-dot::after  { content:''; position:absolute; width:30%; height:30%; border-radius:50%; background:rgba(20,20,20,0.28); pointer-events:none; }
.square.move-capture::after { content:''; position:absolute; width:86%; height:86%; border-radius:50%; border:4px solid rgba(20,20,20,0.32); box-sizing:border-box; pointer-events:none; }
.coord-file { position:absolute; bottom:1px; left:3px; font-size:9px; font-weight:800; pointer-events:none; }
.coord-rank { position:absolute; top:1px; right:3px; font-size:9px; font-weight:800; pointer-events:none; }
.coord-dark  { color:rgba(45,60,30,0.85); }
.coord-light { color:rgba(230,236,210,0.9); }
.piece-wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; cursor:default; transition:transform .08s ease; }
.piece-wrap.cursor-pointer { cursor:grab; }
.piece-wrap.cursor-pointer:hover { transform:scale(1.08); }
.piece-img { width:85%; height:85%; pointer-events:none; user-select:none; filter:drop-shadow(0 3px 4px rgba(0,0,0,.45)); }

/* Move badge */
.move-badge {
  position:absolute; top:-11px; right:-11px;
  width:clamp(24px,calc(var(--sq-size,60px)*0.45),38px);
  height:clamp(24px,calc(var(--sq-size,60px)*0.45),38px);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:clamp(10px,calc(var(--sq-size,60px)*0.21),17px); font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,.8); border:2.5px solid #0f1012; z-index:25;
  animation: badge-pop .35s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes badge-pop { from{transform:scale(0) rotate(-20deg);opacity:0;} to{transform:scale(1) rotate(0deg);opacity:1;} }

/* Eval bar */
.eval-bar-track { width:26px; border-radius:6px; overflow:hidden; background:#15161a; position:relative; display:flex; flex-direction:column-reverse; border:1px solid #2a2b30; flex-shrink:0; }
.eval-bar-white { width:100%; background:#f1f1ec; height:50%; transition:height .6s cubic-bezier(.4,0,.2,1); }
.eval-label { position:absolute; left:0; right:0; text-align:center; font-size:9px; font-weight:800; color:#0f1012; bottom:3px; pointer-events:none; z-index:10; }
.eval-label.label-top { color:#f1f1ec; top:3px; bottom:auto; }

/* Progress / spinner */
.spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg);} }
.progress-track { width:100%; height:7px; background:#27272a; border-radius:4px; overflow:hidden; }
.progress-fill  { height:100%; background:linear-gradient(90deg,#3aab59,#81b64c); transition:width .2s ease; width:0%; }

/* Buttons / inputs */
.tab-btn { transition:color .15s,border-color .15s; border-bottom:2px solid transparent; }
.tab-btn.tab-active { color:#fafafa; border-bottom-color:#81b64c; }
.input-base { background:#18181b; border:1px solid #3f3f46; border-radius:8px; padding:8px 10px; font-size:13px; color:#e4e4e7; width:100%; outline:none; }
.input-base:focus { border-color:#71717a; }
.btn-primary   { background:#4a7c33; color:#fff; font-weight:600; border-radius:8px; padding:8px 14px; font-size:13px; transition:background .15s; }
.btn-primary:hover    { background:#57903c; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.btn-secondary { background:#27272a; color:#d4d4d8; font-weight:600; border-radius:8px; padding:8px 12px; font-size:13px; transition:background .15s; border:1px solid #3f3f46; }
.btn-secondary:hover    { background:#3f3f46; }
.btn-secondary:disabled { opacity:.4; cursor:not-allowed; }
.icon-btn { width:38px; height:38px; border-radius:8px; background:#1f2023; border:1px solid #313236; display:flex; align-items:center; justify-content:center; color:#d4d4d8; transition:background .15s; }
.icon-btn:hover    { background:#2c2d31; }
.icon-btn:disabled { opacity:.35; cursor:not-allowed; }
.promo-btn { width:52px; height:52px; border-radius:8px; background:#2c2d31; border:1px solid #46474c; display:flex; align-items:center; justify-content:center; }
.promo-btn:hover { background:#3a3b40; }
.promo-btn img { width:70%; height:70%; }

/* Move quality badge in list */
.quality-sym {
  display:inline-flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; border-radius:3px; padding:0 4px; min-width:20px; height:18px;
  flex-shrink:0;
}

/* Annotation card */
.annotation-card {
  padding:10px 12px; border-radius:8px;
  border-left:3px solid var(--cc,#81b64c);
  font-size:12px; color:#d4d4d8; line-height:1.6;
  animation:fade-in .2s ease;
}
@keyframes fade-in { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
.ann-header { display:flex; align-items:center; gap:6px; font-weight:700; font-size:13px; color:var(--cc,#81b64c); margin-bottom:5px; }
.ann-sym { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:12px; font-weight:900; }
.ann-body { color:#c4c4c8; }
.ann-best { margin-top:6px; padding:5px 8px; background:rgba(255,255,255,0.04); border-radius:5px; font-size:0.72rem; color:#a1a1aa; }
.ann-best strong { color:#81b64c; }
.ann-eval { margin-top:6px; font-size:0.72rem; color:#71717a; line-height:1.55; }

/* Opening badge */
.opening-badge {
  background:#1e2430; border:1px solid #2e3a52; border-radius:6px;
  padding:4px 9px; font-size:11px; color:#7ba7d8;
  display:inline-flex; align-items:center; gap:6px; font-weight:600;
}
.opening-badge .eco { color:#4a6a8a; font-family:monospace; font-size:10px; }

/* Move list */
.move-row { display:grid; grid-template-columns:26px 1fr 1fr; gap:1px; }
.move-cell {
  padding:3px 5px; border-radius:5px; font-size:13px; cursor:pointer;
  display:flex; align-items:center; gap:3px; transition:background .1s;
  font-variant-numeric:tabular-nums; min-width:0;
}
.move-cell:hover { background:#2a2b30; }
.move-cell.active { background:#263326; color:#c8e8a0; }
.move-num { color:#4a4a52; font-size:11px; display:flex; align-items:center; padding:3px 2px; }
.move-san { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Accuracy bar colors */
.acc-bar-w { background:linear-gradient(90deg,#c0c0c0,#f1f1ec); }
.acc-bar-b { background:linear-gradient(90deg,#555,#888); }

  const PARSED = DB.map(([eco, name, movesStr]) => ({
    eco,
    name,
    tokens: movesStr.split(' ')
  }));

  /**
   * Finds the deepest opening that matches the given SAN history prefix.
   *
   * Strategy:
   *  1. Direct prefix match — walk token-by-token (handles mainlines).
   *  2. Transposition match — after each move, check if the resulting FEN
   *     piece-placement (ignoring castling/ep/clocks) matches the start of
   *     ANY database line, even if the move order differs.
   *
   * @param {string[]} sanHistory  e.g. ['e4','e5','Nf3','Nc6']
   * @returns {{ eco, name, isBook, ply }}
   */
  function classify(sanHistory) {
    if (!sanHistory || !sanHistory.length)
      return { eco: null, name: null, isBook: false, ply: 0 };

    // ── 1. Direct prefix match ─────────────────────────────────────────
    let bestDirect = null, bestDirectLen = 0;
    for (const entry of PARSED) {
      const { tokens } = entry;
      const len = Math.min(tokens.length, sanHistory.length);
      if (len === 0) continue;
      let ok = true;
      for (let i = 0; i < len; i++) {
        if (tokens[i] !== sanHistory[i]) { ok = false; break; }
      }
      if (ok && len > bestDirectLen) {
        bestDirectLen = len;
        bestDirect = entry;
      }
    }

    // ── 2. Transposition match via FEN ─────────────────────────────────
    // Build a map of position (piece-placement string) → DB entry at each ply.
    // We compare against the position reached after each DB move sequence.
    let bestTranspo = null, bestTranspoLen = 0;
    try {
      if (typeof Chess !== 'undefined') {
        // Replay the game to get FENs at each ply
        const gameFens = [];
        const g = new Chess();
        gameFens.push(piecePlacement(g.fen()));
        for (const san of sanHistory) {
          if (!g.move(san, { sloppy: true })) break;
          gameFens.push(piecePlacement(g.fen()));
        }

        // For each DB entry, replay its moves and compare piece-placement FENs
        for (const entry of PARSED) {
          const { tokens } = entry;
          const db = new Chess();
          let matchLen = 0;
          for (let i = 0; i < tokens.length; i++) {
            if (!db.move(tokens[i], { sloppy: true })) break;
            const dbFen = piecePlacement(db.fen());
            // Check if this DB position appears anywhere in our game history
            const gameIdx = gameFens.indexOf(dbFen);
            if (gameIdx > 0) { // gameIdx 0 = start position
              matchLen = Math.max(matchLen, gameIdx);
            }
          }
          if (matchLen > bestTranspoLen) {
            bestTranspoLen = matchLen;
            bestTranspo = entry;
          }
        }
      }
    } catch (e) { /* Chess.js not ready yet, fall through */ }

    // ── Pick the better match ──────────────────────────────────────────
    let bestMatch = null, bestLen = 0;
    if (bestDirectLen >= bestTranspoLen) {
      bestMatch = bestDirect; bestLen = bestDirectLen;
    } else {
      bestMatch = bestTranspo; bestLen = bestTranspoLen;
    }

    if (!bestMatch) return { eco: null, name: null, isBook: false, ply: 0 };

    // "isBook" = the game is STILL inside the matched line.
    // For direct match: every move so far was in the DB line.
    // We use bestDirectLen here because transpositions are trickier:
    // even after reaching a known position by transposition the remaining
    // book moves are still valid.
    const isBook = bestLen >= sanHistory.length;
    return { eco: bestMatch.eco, name: bestMatch.name, isBook, ply: bestLen };
  }

  /** Extract piece-placement string from a FEN (ignores castling/ep/clocks) */
  function piecePlacement(fen) {
    return fen ? fen.split(' ')[0] : '';
  }

  /**
   * Returns the name of the current opening given SAN history,
   * or null if not recognized.
   */
  function getOpeningName(sanHistory) {
    const r = classify(sanHistory);
    return r.name || null;
  }

  return { classify, getOpeningName, DB };
})();

/* ================================================================ MOVE CLASSIFIER
 *
 * Classification uses win-percentage loss (WPL) from the mover's perspective,
 * plus context signals (sacrifice, uniqueness, book).
 *
 * Thresholds (WPL):
 *   0–5   → best / great / brilliant (if conditions met)
 *   5–10  → excellent
 *   10–20 → good
 *   20–40 → inaccuracy
 *   40–60 → mistake
 *   60+   → blunder
 */
function classifyMove(mv, prevWhiteCp, currWhiteCp, prevSecondWhiteCp, sanHistory, ply){
  // 1. Book check — sanHistory already contains moves 1..ply
  //    classify() returns isBook=true when the game is still inside a known DB line
  //    (by direct match or transposition). No separate ply guard needed.
  if(typeof OpeningBook!=='undefined'){
    const br=OpeningBook.classify(sanHistory);
    if(br.isBook) return'book';
  }

  const color = mv.color;

  // WP before and after from white's frame
  const wpBefore = winPct(prevWhiteCp);
  const wpAfter  = winPct(currWhiteCp);

  // WPL for the mover: positive = bad for mover
  // White wants WP to go UP; Black wants WP to go DOWN
  const wpl = color==='w'
    ? Math.max(0, wpBefore - wpAfter)
    : Math.max(0, wpAfter  - wpBefore);

  // 2. Apply WPL thresholds (descending badness)
  if(wpl >= WPL.mistake)    return 'blunder';
  if(wpl >= WPL.inaccuracy) return 'mistake';
  if(wpl >= WPL.good)       return 'inaccuracy';
  if(wpl >= WPL.excellent)  return 'good';

  // wpl < 20 — good or better. Determine if best.
  // "Best" = the mover's position after their move is as good as what the engine
  // said was available in the previous position.
  // We check closeness to the best-possible WP.
  // prevWhiteCp IS the engine's evaluation from the position before the move,
  // so it represents the best achievable. Any WPL from that is the gap to best.
  // (Already computed as `wpl` above — if wpl < excellent they played near-best.)

  if(wpl >= WPL.best){
    // 5–10 WPL: still excellent, not quite best
    return 'excellent';
  }

  // wpl < 5: played the best move (or very close)
  // Check gap between best (prevWhiteCp) and second-best (prevSecondWhiteCp)
  let gap = 0;
  if(prevSecondWhiteCp !== null){
    // Gap in WP for the mover between best and second-best
    const wpBest   = color==='w' ? winPct(prevWhiteCp) : 100-winPct(prevWhiteCp);
    const wpSecond = color==='w' ? winPct(prevSecondWhiteCp) : 100-winPct(prevSecondWhiteCp);
    gap = Math.max(0, wpBest - wpSecond);
  }

  // Sacrifice detection: mover's piece moved WITHOUT capturing, yet position improved
  const isSac = detectSacrifice(mv, prevWhiteCp, currWhiteCp, color);

  if(isSac && gap >= GAP_BRILLIANT) return 'brilliant';
  if(gap >= GAP_GREAT)              return 'great';
  if(wpl < WPL.best)                return 'best';
  return 'excellent';
}

function detectSacrifice(mv, prevCp, currCp, color){
  // Don't flag king or pawn moves
  if(!mv||mv.piece==='k'||mv.piece==='p') return false;
  // Must NOT be capturing (piece goes to enemy-occupied square)
  if(mv.captured) return false;
  // Position must have IMPROVED for the mover after what looks like giving material
  const improved = color==='w' ? (currCp - prevCp) > 40 : (prevCp - currCp) > 40;
  return improved;
}

    `A real slip. <strong>{s}</strong> lets the opponent back into the game in a way that didn't have to happen.`,
    `<strong>{s}</strong> goes wrong. {c} had a strong continuation available but chose a move that gives the opponent far too much counterplay.`,
    `This is where things go awry. <strong>{s}</strong> is a mistake that changes the character of the position considerably — and not in {c}'s favour.`,
    `<strong>{s}</strong> is a misstep that costs {c} real ground. The engine sees a clear path that was missed here.`,
    `{c} stumbles with <strong>{s}</strong>. From a comfortable position, this move invites unnecessary complications that tilt the balance.`,
    `<strong>{s}</strong> is a move {c} will regret. It looks natural but violates the demands of the position in a concrete way.`,
    `A costly inaccuracy. <strong>{s}</strong> hands the opponent an opportunity they didn't have a moment ago — and they'll likely take it.`,
    `<strong>{s}</strong> misses the point of the position. {c} needed to be more alert to what the opponent was threatening — or planning.`,
  ],

  blunder: [
    `<strong>{s}</strong> is a serious blunder. This move throws away a major advantage — the kind of error that decides games.`,
    `Oh no. <strong>{s}</strong> is a devastating mistake. {c} had a winning position and this move lets it slip away drastically.`,
    `A critical error. <strong>{s}</strong> overlooks something the engine sees immediately, and the cost is enormous.`,
    `<strong>{s}</strong> is a game-changing blunder. In one move, {c} goes from commanding to struggling — or worse.`,
    `This is the move {c} won't want to see in the post-game review. <strong>{s}</strong> is a serious oversight that swings the evaluation dramatically.`,
    `<strong>{s}</strong> collapses the position. A sharp, concrete response from the opponent now tears this apart.`,
    `Fatal. <strong>{s}</strong> ignores a decisive threat — or creates one for the opponent. The engine's evaluation shifts massively after this.`,
    `<strong>{s}</strong> is an unfortunate blunder. The winning plan was available, but this move abandons it entirely in one stroke.`,
    `A moment of miscalculation. <strong>{s}</strong> misses a key element of the position, and the consequences are severe for {c}.`,
    `<strong>{s}</strong> — and just like that, the advantage is gone. This kind of move is hard to explain, easy to make under pressure.`,
  ],
};

function buildAnnotationText(mv, wpl, prevWhiteCp, currWhiteCp, bestSan, openingInfo){
  const cls  = mv.classification;
  const info = CLS[cls];
  if(!info) return null;

  const color  = mv.color==='w' ? 'White' : 'Black';
  const opp    = mv.color==='w' ? 'Black' : 'White';
  const san    = mv.san;
  const delta  = mv.color==='w' ? currWhiteCp - prevWhiteCp : prevWhiteCp - currWhiteCp;
  const evalStr= (delta>=0?'+':'') + (delta/100).toFixed(2);

  // Context tags for richer commentary
  const isCapture  = !!mv.captured;
  const isCheck    = san.includes('+') || san.includes('#');
  const isCastle   = san.startsWith('O-O');
  const isPromotion= !!mv.promotion;
  const piece      = mv.piece; // p n b r q k
  const moveNum    = mv.moveNumber||'';
  const isOpening  = moveNum <= 10;
  const isEndgame  = moveNum >= 30;
  const evalPawns  = Math.abs(prevWhiteCp/100).toFixed(1);

  // Opening name for book moves
  const openingName = openingInfo&&openingInfo.name ? openingInfo.name : null;
  const openingEco  = openingInfo&&openingInfo.eco  ? openingInfo.eco+': ' : '';

  // Pick a base template
  const pool = COMMENTARY[cls];
  if(!pool) return null;

  // Seed selection deterministically per move to avoid flickering on re-render
  const seed = (mv.ply||0) * 7 + (san.charCodeAt(0)||0);
  const template = pool[seed % pool.length];

  let body = fillTemplate(template, {
    s:   `<strong>${san}</strong>`,
    c:   color,
    opp: opp,
    w:   wpl.toFixed(1),
    ev:  evalStr,
    opening: openingName ? `${openingEco}${openingName}` : 'this opening',
  });

  // Append a short context sentence for colour
  const suffix = buildContextSuffix(cls, { isCapture, isCheck, isCastle, isPromotion,
    piece, isOpening, isEndgame, color, opp, san, wpl, evalPawns, moveNum, seed });
  if(suffix) body += ' ' + suffix;

  const showBest = ['good','inaccuracy','mistake','blunder'].includes(cls);
  return { body, showBest, evalStr };
}

function buildContextSuffix(cls, ctx){
  const { isCapture, isCheck, isCastle, isPromotion, piece,
          isOpening, isEndgame, color, opp, san, wpl, evalPawns, moveNum, seed } = ctx;

  // Brilliant / great: add flavour about what makes it hard
  if(cls==='brilliant'){
    const opts = [
      isCapture ? `Giving up material like this requires nerves of steel and concrete calculation.` : null,
      `Most players would never even put this move on their candidate list.`,
      `The engine spots it instantly; a human finding this over the board is a genuine achievement.`,
      `Counter-intuitive moves like this are what separate calculators from chess artists.`,
      isCheck ? `The check forces the opponent into exactly the bind ${color} was looking for.` : null,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  if(cls==='great'){
    const opts = [
      `The alternative candidates look tempting but fall short under precise play from ${opp}.`,
      isOpening ? `In the opening, finding the most accurate move in a sharp position like this is impressive.` : null,
      isEndgame ? `Endgame accuracy like this is what converts advantages into wins.` : null,
      `This required seeing several moves ahead to understand why the alternatives don't work.`,
      `It's the kind of move that looks obvious only after you've seen it.`,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  // Best / excellent: occasional short flourish
  if(cls==='best'||cls==='excellent'){
    if(seed%3===0) return null; // often no suffix — keeps it snappy
    const opts = [
      isOpening  ? `Good opening preparation showing here.` : null,
      isEndgame  ? `Endgame technique on display.` : null,
      isCastle   ? `Castling at the right moment keeps the king safe while connecting the rooks.` : null,
      isCapture  ? `The recapture is timed well.` : null,
      isPromotion? `Promotion decisions require exact calculation — this one is right.` : null,
      piece==='n' ? `Knight moves can be especially tricky to evaluate — well spotted.` : null,
      `${color} stays on course without any unnecessary complications.`,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  // Good: why it's fine but not perfect
  if(cls==='good'){
    const opts = [
      `The engine's preference was a bit more active, but this keeps things simple and solid.`,
      isOpening ? `In the opening there's rarely just one good move — this is a reasonable alternative.` : null,
      `A human choice: safe, clear, and perfectly playable.`,
      `Nothing wrong here — just a slightly different set of priorities than the engine's.`,
      piece==='p' ? `Pawn moves are committal since they can't be undone — this one is fine, though.` : null,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  // Inaccuracy: what was missed
  if(cls==='inaccuracy'){
    const opts = [
      `A slightly more energetic continuation was available that kept the pressure on ${opp}.`,
      `Not a crisis, but the engine found a way to be more precise that ${color} overlooked.`,
      `These small imprecisions add up over the course of a game.`,
      isOpening ? `In the opening, small inaccuracies can let the opponent equalise faster than expected.` : null,
      `The position is still fine for ${color}, but a bit of the initiative has been given back.`,
      `Easy to play, difficult to criticise — yet the engine insists there was something better.`,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  // Mistake: what went wrong
  if(cls==='mistake'){
    const opts = [
      `${color} likely underestimated what ${opp} could do in response.`,
      `The position called for more caution — or more aggression — than this move provides.`,
      isCapture ? `The capture looks natural but creates new problems that outweigh the material gain.` : null,
      `A moment of misjudgement in an otherwise well-played game.`,
      `${opp} should now be able to seize the initiative.`,
      isEndgame ? `In endgames, mistakes like this are often irreversible.` : null,
      `The engine's alternative keeps the tension; this move releases it in the wrong way.`,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  // Blunder: severity and what follows
  if(cls==='blunder'){
    const severity = wpl>40 ? 'decisive' : 'very significant';
    const opts = [
      `The evaluation swing is ${severity} — this changes the result of the game if ${opp} responds accurately.`,
      isCapture ? `The material might look appealing, but the positional or tactical cost is far too high.` : null,
      `${opp} now has a clear and concrete way to exploit this.`,
      `Under time pressure or fatigue, moves like this happen — but the damage is real.`,
      isEndgame ? `In the endgame, a blunder like this is almost always fatal.` : null,
      `There was a clean continuation available — instead, ${color} walks into serious trouble.`,
      `A tough moment. Blunders sting most when the position was so promising before.`,
      isCheck ? `Walking into a check sequence like this shows the calculation broke down.` : null,
    ].filter(Boolean);
    return opts[seed % opts.length];
  }

  return null;
}

/* ================================================================ ENGINE */
const engine = {
  worker:null, ready:false, failed:false, lastErrors:[], activeLabel:null,
  async init(){
    this.failed=false; this.lastErrors=[]; this.activeLabel=null;
    for(const src of ENGINE_SOURCES){
      try{ this.worker=await this._createWorker(src); this.ready=true; this.activeLabel=src.label; return true; }
      catch(e){ this.lastErrors.push(src.label+' — '+(e.message||e)); }
    }
    this.failed=true; return false;
  },
  _createWorker(src){
    return new Promise((resolve,reject)=>{
      let done=false;
      const fin=(fn,v)=>{if(done)return;done=true;clearTimeout(to);fn(v);};
      const hdr=src.wasmBase?`var Module={locateFile:function(p){return ${JSON.stringify(src.wasmBase)}+p;}};\n`:'';
      const code=hdr+`try{importScripts(${JSON.stringify(src.url)});}catch(e){postMessage('__ERR__:'+(e&&e.message?e.message:String(e)));}`;
      let w;
      try{const bl=new Blob([code],{type:'application/javascript'});w=new Worker(URL.createObjectURL(bl));}catch(e){reject(e);return;}
      const to=setTimeout(()=>{try{w.terminate();}catch(e){}fin(reject,new Error('timeout'));},src.wasmBase?25000:12000);
      const onMsg=e=>{
        const ln=typeof e.data==='string'?e.data:(e.data&&e.data.data)||'';
        if(!ln)return;
        if(ln.startsWith('__ERR__')){w.removeEventListener('message',onMsg);try{w.terminate();}catch(e){}fin(reject,new Error(ln.slice(7)));return;}
        if(ln.includes('uciok')){
          w.removeEventListener('message',onMsg);
          w.postMessage('setoption name MultiPV value 2');
          const onRdy=e2=>{const l2=typeof e2.data==='string'?e2.data:(e2.data&&e2.data.data)||'';if(l2.includes('readyok')){w.removeEventListener('message',onRdy);fin(resolve,w);}};
          w.addEventListener('message',onRdy); w.postMessage('isready');
        }
      };
      w.addEventListener('message',onMsg);
      w.onerror=err=>{try{w.terminate();}catch(e){}fin(reject,new Error((err&&err.message)||'worker error'));};
      w.postMessage('uci');
    });
  },
  _analyzeNow(fen,depth){
    return new Promise(resolve=>{
      if(!this.worker){resolve({bestMove:null,best:null,second:null});return;}
      const res={};
      const w=this.worker;
      const handler=e=>{
        const ln=typeof e.data==='string'?e.data:(e.data&&e.data.data)||'';
        if(!ln)return;
        if(ln.startsWith('info')&&ln.includes(' pv ')){
          const mpv=((/multipv (\d+)/.exec(ln)||[,1])[1])|0;
          const cp=(/score cp (-?\d+)/.exec(ln)||[])[1];
          const mt=(/score mate (-?\d+)/.exec(ln)||[])[1];
          const pv=(/ pv (\S+)/.exec(ln)||[])[1];
          const entry={};
          if(cp!=null) entry.score={type:'cp',value:+cp};
          else if(mt!=null) entry.score={type:'mate',value:+mt};
          if(pv) entry.move=pv;
          if(entry.score&&entry.move) res[mpv]=entry;
        } else if(ln.startsWith('bestmove')){
          w.removeEventListener('message',handler);
          const bm=ln.split(' ')[1];
          resolve({bestMove:(!bm||bm==='(none)')?null:bm, best:res[1]?res[1].score:null, second:res[2]?res[2].score:null});
        }
      };
      w.addEventListener('message',handler);
      w.postMessage('position fen '+fen);
      w.postMessage('go depth '+depth);
    });
  }
};

/* ================================================================ ANALYSIS */
async function runAnalysis(){
  if(analysisInProgress) return;
  if(!engine.ready){
    await new Promise(r=>{const iv=setInterval(()=>{if(engine.ready||engine.failed){clearInterval(iv);r();}},200);});
  }
  if(engine.failed){setImportStatus('Engine unavailable.',true);return;}
  if(positions.length<2) return;

  analysisInProgress=true; analysisCancelled=false;
  const depth=parseInt(el.depthSelect.value)||15;
  el.analysisProgressWrap.classList.remove('hidden');
  el.analysisProgressBar.style.width='0%';

  // Reset results
  analysisResults=new Array(positions.length).fill(null);

  const total=positions.length-1;

  for(let i=0;i<=total;i++){
    if(analysisCancelled) break;
    el.analysisProgressText.textContent=`Analyzing position ${i+1}/${total+1}…`;
    el.analysisProgressBar.style.width=((i/total)*100)+'%';

    const fen=positions[i];
    const stm=fen.split(' ')[1]; // 'w' or 'b'
    const res=await engine._analyzeNow(fen,depth);

    const whiteCp   = res.best   ? toWhiteCp(res.best,stm)   : 0;
    const whiteMate = res.best   ? toWhiteMate(res.best,stm)  : null;
    const secondCp  = res.second ? toWhiteCp(res.second,stm)  : null;

    analysisResults[i]={ whiteCp, whiteMate, bestMove:res.bestMove, secondWhiteCp:secondCp };

    // Classify move that LED to this position (moveHistory[i-1])
    if(i>0 && moveHistory[i-1]){
      const mv=moveHistory[i-1];
      const prev=analysisResults[i-1]; // position BEFORE the move

      const prevCp   = prev ? prev.whiteCp        : 0;
      const secondPrevCp = prev ? prev.secondWhiteCp : null;
      const sanHist  = moveHistory.slice(0,i).map(m=>m.san);

      mv.classification = classifyMove(mv, prevCp, whiteCp, secondPrevCp, sanHist, i);
      mv.evalBefore      = prevCp;
      mv.evalAfter       = whiteCp;
      mv.evalAfterMate   = whiteMate;
      mv.bestMoveUci     = prev ? prev.bestMove : null;
      mv.secondWp        = secondPrevCp !== null
        ? (mv.color==='w' ? winPct(secondPrevCp) : 100-winPct(secondPrevCp))
        : null;

      // WPL for accuracy
      const wpBefore = winPct(prevCp);
      const wpAfter  = winPct(whiteCp);
      mv.wpl         = mv.color==='w' ? Math.max(0,wpBefore-wpAfter) : Math.max(0,wpAfter-wpBefore);
      mv.moveAccuracy= moveAccFromWpl(mv.wpl);
    }

    await new Promise(r=>setTimeout(r,0)); // yield to browser
  }

  analysisInProgress=false;
  el.analysisProgressWrap.classList.add('hidden');
  el.analysisProgressBar.style.width='100%';

  if(!analysisCancelled){
    // Accuracy
    const wa=[],ba=[];
    for(const mv of moveHistory){
      if(mv.moveAccuracy==null)continue;
      (mv.color==='w'?wa:ba).push(mv.moveAccuracy);
    }
    gameAccuracy.w=sideAccuracy(wa);
    gameAccuracy.b=sideAccuracy(ba);

    // Class counts
    classCounts={};
    CLS_ORDER.forEach(k=>classCounts[k]={w:0,b:0});
    for(const mv of moveHistory){
      if(mv.classification) classCounts[mv.classification][mv.color]++;
    }

    // Determine game opening from full game history
    updateGameOpeningInfo();

    renderAccuracy();
    renderClassBreakdown();
    renderMoveList();
    renderBoard();
    drawEvalGraph();
  }
}

  if(typeof OpeningBook==='undefined') return;

      el.openingInfoEco.textContent=result.eco||'';

function updateOpeningBarForPly(ply){
  if(typeof OpeningBook==='undefined'||!el.openingBar) return;
  if(ply===0){el.openingBar.classList.add('hidden');return;}
  const sanHistory=moveHistory.slice(0,ply).map(m=>m.san);
  const result=OpeningBook.classify(sanHistory);
  if(result.name){

    el.openingBar.classList.add('hidden');
  }
}

/* ================================================================ PGN */
function extractFirstPgn(text){
  const f=text.indexOf('[Event ');
  if(f===-1) return text.trim();
  const s=text.indexOf('[Event ',f+1);
  return(s>0?text.slice(f,s):text.slice(f)).trim();
}
function extractPgnHeaders(pgnText){
  const r={},re=/\[(\w+)\s+"((?:[^"\\]|\\.)*)"\]/g;let m;
  while((m=re.exec(pgnText)))r[m[1]]=m[2].replace(/\\"/g,'"').replace(/\\\\/g,'\\');
  return r;
}
function fmtResult(r){return r==='1-0'?'1–0':r==='0-1'?'0–1':r==='1/2-1/2'?'½–½':r||'*';}

function loadGameFromPGN(pgnText,meta){
  const src=new Chess();
  if(!src.load_pgn(pgnText,{sloppy:true}))throw new Error('Invalid PGN');
  const hist=src.history({verbose:true});
  if(!hist.length)throw new Error('No moves in PGN');

  const newHeaders=src.header()||{};
  const newMeta=Object.assign({whiteAvatar:null,blackAvatar:null,endTime:null,source:null,rawPgn:null},meta||{});
  if(!newMeta.endTime)newMeta.endTime=deriveDateFromHeaders(newHeaders);
  newMeta.rawPgn=pgnText;

  let startFen;
  if(newHeaders.SetUp==='1'&&newHeaders.FEN){try{new Chess(newHeaders.FEN);startFen=newHeaders.FEN;}catch(e){}}

  const replay=startFen?new Chess(startFen):new Chess();
  const newPositions=[replay.fen()];
  const newMoveHistory=[];

  for(let i=0;i<hist.length;i++){
    const m=hist[i];
    const fenBefore=replay.fen();
    const result=replay.move(m.san);
    if(!result)throw new Error('Cannot replay move '+(i+1)+' ('+m.san+')');
    newPositions.push(replay.fen());
    newMoveHistory.push({
      ply:i+1,
      moveNumber:parseInt(fenBefore.split(' ')[5],10)||Math.floor(i/2)+1,
      color:m.color, san:m.san, from:m.from, to:m.to,
      piece:m.piece, captured:m.captured||null, promotion:m.promotion||null,
      uci:m.from+m.to+(m.promotion||''),
      classification:null, wpl:null, moveAccuracy:null,
      evalBefore:null, evalAfter:null, evalAfterMate:null,
      bestMoveUci:null, secondWp:null
    });
  }

  exitPlayMode(true);
  headers=newHeaders; gameMeta=newMeta;
  positions=newPositions; moveHistory=newMoveHistory;
  currentPly=0; flipped=false;
  analysisResults=new Array(positions.length).fill(null);
  classCounts=null; gameAccuracy={w:null,b:null};

  renderGameHeader();
  renderBoard();
  renderMoveList();
  renderClassBreakdown();
  renderAccuracy();
  updateEvalDisplays();
  drawEvalGraph();
  updateGameOpeningInfo();
  el.reviewEmptyState.classList.add('hidden');
  el.reviewContent.classList.remove('hidden');
}

function handleNewPgn(pgnText,meta){
  loadGameFromPGN(extractFirstPgn(pgnText),meta);
  switchTab('review');
  runAnalysis();
}

/* ================================================================ RENDER BOARD */
function renderBoard(){
  const fen   = playMode&&playGame ? playGame.fen() : positions[currentPly];
  const board = fenToBoard(fen);
  const game  = new Chess(fen);

  const lastMove = playMode ? playLastMove
    : (currentPly>0?{from:moveHistory[currentPly-1].from,to:moveHistory[currentPly-1].to}:null);

  // King in check?
  let checkSq=null;
  if(game.in_check()){
    const kc=game.turn();
    outer:for(let r=0;r<8;r++)for(let c=0;c<8;c++){
      const p=game.board()[r][c];
      if(p&&p.type==='k'&&p.color===kc){checkSq='abcdefgh'[c]+(8-r);break outer;}
    }
  }

  const sqPx=el.board.offsetWidth?Math.floor(el.board.offsetWidth/8):60;
  el.board.style.setProperty('--sq-size',sqPx+'px');
  el.board.innerHTML='';

  for(let row=0;row<8;row++){
    for(let col=0;col<8;col++){
      const sq=squareAt(row,col,flipped);
      const light=isLightSquare(sq);
      const cell=document.createElement('div');
      cell.className='square '+(light?'light':'dark');
      cell.dataset.sq=sq;

      if(lastMove&&(sq===lastMove.from||sq===lastMove.to))
        cell.classList.add(sq===lastMove.from?'sq-highlight-from':'sq-highlight-to');
      if(sq===checkSq)     cell.classList.add('sq-check');
      if(sq===selectedSquare) cell.classList.add('sq-selected');
      if(legalTargets.some(t=>t.to===sq))
        cell.classList.add(pieceAt(board,sq)?'move-capture':'move-dot');

      // Coordinates
      const showFile=(!flipped&&row===7)||(flipped&&row===0);
      const showRank=(!flipped&&col===0)||(flipped&&col===7);
      if(showRank){const s=document.createElement('span');s.className='coord-rank '+(light?'coord-dark':'coord-light');s.textContent=sq[1];cell.appendChild(s);}
      if(showFile){const s=document.createElement('span');s.className='coord-file '+(light?'coord-dark':'coord-light');s.textContent=sq[0];cell.appendChild(s);}

      // Piece
      const piece=board[row][col];
      if(piece){
        const wrap=createPieceEl(piece.color,piece.type);
        const movable=playMode&&humanColor===piece.color&&game.turn()===piece.color;
        if(movable)wrap.classList.add('cursor-pointer');
        wrap.addEventListener('click',()=>handleSquareClick(sq));
        cell.appendChild(wrap);
      }

      // Move quality badge (review mode, destination square of current move)
      if(!playMode && currentPly>0 && sq===moveHistory[currentPly-1].to){
        const mv=moveHistory[currentPly-1];
        if(mv.classification){
          const ci=CLS[mv.classification];
          const badge=document.createElement('div');
          badge.className='move-badge';
          badge.style.cssText=`background:${ci.color};color:${ci.textDark?'#1a1a1a':'#fff'}`;
          badge.textContent=ci.sym;
          badge.title=ci.label;
          cell.appendChild(badge);
        }
      }

      if(!piece||playMode) cell.addEventListener('click',()=>handleSquareClick(sq));
      el.board.appendChild(cell);
    }
  }

  // Update nav
  if(!playMode){
    el.btnFirst.disabled=el.btnPrev.disabled=(currentPly===0);
    el.btnNext.disabled=el.btnLast.disabled=(currentPly>=positions.length-1);
  }

  updateOpeningBarForPly(currentPly);
  updateEvalDisplays();
  renderInlineAnnotation();
}

/* ================================================================ INLINE ANNOTATION */
function renderInlineAnnotation(){
  if(!el.inlineAnnotation)return;
  if(playMode||currentPly===0){el.inlineAnnotation.classList.add('hidden');return;}

  const mv=moveHistory[currentPly-1];
  if(!mv||!mv.classification){el.inlineAnnotation.classList.add('hidden');return;}

  const ci=CLS[mv.classification];
  const wpl=mv.wpl||0;
  const prevCp=mv.evalBefore||0;
  const currCp=mv.evalAfter||0;

  // Opening context for book moves
  const sanHistory=moveHistory.slice(0,currentPly).map(m=>m.san);
  const openingInfo=typeof OpeningBook!=='undefined' ? OpeningBook.classify(sanHistory) : null;

  const ann=buildAnnotationText(mv,wpl,prevCp,currCp,null,openingInfo);
  if(!ann){el.inlineAnnotation.classList.add('hidden');return;}

  // Try converting bestMoveUci to SAN
  let bestSan='';
  if(mv.bestMoveUci&&mv.classification!=='best'&&mv.classification!=='brilliant'&&mv.classification!=='great'&&mv.classification!=='book'){
    try{
      const g=new Chess(positions[currentPly-1]);
      const from=mv.bestMoveUci.slice(0,2),to=mv.bestMoveUci.slice(2,4),promo=mv.bestMoveUci[4];
      const r=g.move({from,to,promotion:promo||undefined});
      if(r)bestSan=r.san;
    }catch(e){}
  }

  // Eval change display
  const evalBefore=fmtEval(prevCp,null);
  const evalAfter =fmtEval(currCp,mv.evalAfterMate);
  const evalArrow  = mv.color==='w'
    ? (currCp>=prevCp?'↑':'↓')
    : (currCp<=prevCp?'↑':'↓');

  el.inlineAnnotation.innerHTML=`
    <div class="annotation-card" style="--cc:${ci.color};background:${ci.bg}">
      <div class="ann-header">
        <span class="ann-sym" style="background:${ci.color};color:${ci.textDark?'#1a1a1a':'#fff'}">${ci.sym}</span>
        <span>${ci.label}</span>
        <span class="text-zinc-400 font-normal text-xs ml-auto">${esc(mv.san)}</span>
      </div>
      <div class="ann-body">${ann.body}</div>
      <div class="ann-eval">
        Eval: ${evalBefore} ${evalArrow} ${evalAfter}
        &nbsp;·&nbsp;
        This move reduced ${mv.color==='w'?'White':'Black'}'s winning chances by <strong style="color:${ci.color}">${wpl.toFixed(1)}%</strong>
        — meaning that before this move, ${mv.color==='w'?'White':'Black'} had a ${wpl.toFixed(1)}% higher probability of winning according to the engine.
      </div>
      ${bestSan?`<div class="ann-best">Best move: <strong>${esc(bestSan)}</strong></div>`:''}
    </div>`;
  el.inlineAnnotation.classList.remove('hidden');
}

/* ================================================================ EVAL GRAPH */
function drawEvalGraph(){
  const canvas=el.evalGraph;
  if(!canvas)return;
  const W=canvas.offsetWidth||300,H=canvas.offsetHeight||120;
  canvas.width=W; canvas.height=H;
  // Update eval label in graph header
  if(el.evalGraphLabel){
    let wCp=0,wMate=null;
    if(playMode){wCp=lastPlayEvalWhiteCp;wMate=lastPlayEvalMate;}
    else if(analysisResults[currentPly]){wCp=analysisResults[currentPly].whiteCp;wMate=analysisResults[currentPly].whiteMate;}
    el.evalGraphLabel.textContent=fmtEval(wCp,wMate);
    el.evalGraphLabel.style.color=wCp>=0?'#e4e4e7':'#a1a1aa';
  }
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1b1e'; ctx.fillRect(0,0,W,H);

  const pts=analysisResults.map(r=>r?clamp(winPct(r.whiteCp),2,98):null);
  const valid=pts.filter(p=>p!==null);
  if(!valid.length) return;

  const N=pts.length;
  const xOf=i=>(i/(N-1||1))*W;
  const yOf=v=>H-(v/100)*H;

  // Fill white region
  ctx.beginPath();
  let started=false;
  for(let i=0;i<N;i++){
    if(pts[i]==null)continue;
    const x=xOf(i),y=yOf(pts[i]);
    if(!started){ctx.moveTo(x,H);ctx.lineTo(x,y);started=true;}
    else ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);ctx.closePath();
  ctx.fillStyle='rgba(241,241,236,0.12)';ctx.fill();

  // Line
  ctx.beginPath(); started=false;
  for(let i=0;i<N;i++){
    if(pts[i]==null)continue;
    if(!started){ctx.moveTo(xOf(i),yOf(pts[i]));started=true;}
    else ctx.lineTo(xOf(i),yOf(pts[i]));
  }
  ctx.strokeStyle='rgba(241,241,236,0.65)';ctx.lineWidth=1.5;ctx.stroke();

  // 50% line
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);

  // Quality markers on graph
  for(let i=0;i<moveHistory.length;i++){
    const mv=moveHistory[i];
    if(!mv.classification)continue;
    const ci=CLS[mv.classification];
    if(pts[i+1]==null)continue;
    const x=xOf(i+1),y=yOf(pts[i+1]);
    // Only show blunders/mistakes/brilliant on graph (keep it clean)
    if(mv.classification==='blunder'||mv.classification==='mistake'||mv.classification==='brilliant'||mv.classification==='great'){
      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);
      ctx.fillStyle=ci.color;ctx.fill();
    }
  }

  // Current position cursor
  if(N>1&&pts[currentPly]!=null){
    const x=xOf(currentPly),y=yOf(pts[currentPly]);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle='#81b64c';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5;ctx.stroke();
  }
}

async function doEngineMove(){
  if(!playMode||!playGame||!engine.ready)return;
  const fen=playGame.fen();
  showBanner('Engine thinking…');
  await new Promise(r=>setTimeout(r,50));
  const res=await engine._analyzeNow(fen,12);
  if(!playMode)return;
  const stm=fen.split(' ')[1];
  lastPlayEvalWhiteCp=res.best?toWhiteCp(res.best,stm):lastPlayEvalWhiteCp;
  lastPlayEvalMate   =res.best?toWhiteMate(res.best,stm):null;
  if(res.bestMove&&res.bestMove!=='(none)'){
    const from=res.bestMove.slice(0,2),to=res.bestMove.slice(2,4),promo=res.bestMove[4];
    const mv=playGame.move({from,to,promotion:promo||'q'});
    if(mv){playLastMove={from:mv.from,to:mv.to};playMoveSound({isCapture:!!mv.captured,isCheck:playGame.in_check()});}
  }
  el.playStatusBanner.classList.add('hidden');
  renderBoard();
  checkPlayEnd();
}

function showBanner(txt){el.playStatusBanner.textContent=txt;el.playStatusBanner.classList.remove('hidden');}

function checkPlayEnd(){
  if(!playGame||!playGame.game_over())return;
  let msg='Game over';
  if(playGame.in_checkmate())     msg=playGame.turn()==='w'?'Black wins by checkmate':'White wins by checkmate';
  else if(playGame.in_stalemate()) msg='Stalemate — Draw';
  else if(playGame.in_draw())      msg='Draw';
  showBanner(msg);
  playGameEndSound();
}

/* ================================================================ SQUARE CLICK */
function handleSquareClick(sq){
  if(playMode&&playGame){
    if(playGame.turn()!==humanColor)return;
    if(selectedSquare){
      const mv=legalTargets.find(t=>t.to===sq);
      if(mv){
        const p=pieceAt(fenToBoard(playGame.fen()),selectedSquare);
        if(p&&p.type==='p'&&(sq[1]==='8'||sq[1]==='1')){
          pendingPromotion={from:selectedSquare,to:sq};
          showPromoPicker(humanColor); return;
        }
        const result=playGame.move({from:selectedSquare,to:sq,promotion:'q'});
        if(result){
          playLastMove={from:result.from,to:result.to};
          playMoveSound({isCapture:!!result.captured,isCheck:playGame.in_check()});
          selectedSquare=null;legalTargets=[];
          renderBoard();checkPlayEnd();
          if(!playGame.game_over())setTimeout(doEngineMove,300);
          return;
        }
      }
      selectedSquare=null;legalTargets=[];renderBoard();return;
    }
    const p=pieceAt(fenToBoard(playGame.fen()),sq);
    if(p&&p.color===humanColor){
      selectedSquare=sq;
      legalTargets=playGame.moves({square:sq,verbose:true});
      renderBoard();
    }
    return;
  }
  // Review mode: clicking a square doesn't do anything special
}

function showPromoPicker(color){
  el.promotionButtons.innerHTML='';
  ['q','r','b','n'].forEach(p=>{
    const btn=document.createElement('button');
    btn.className='promo-btn';
    const img=document.createElement('img');
    img.src=PIECE_URLS[color][p];img.alt=p;btn.appendChild(img);
    btn.addEventListener('click',()=>{
      el.promotionPicker.classList.add('hidden');
      if(!pendingPromotion)return;
      const result=playGame.move({from:pendingPromotion.from,to:pendingPromotion.to,promotion:p});
      if(result){playLastMove={from:result.from,to:result.to};playMoveSound({isCapture:!!result.captured,isCheck:playGame.in_check()});}
      pendingPromotion=null;selectedSquare=null;legalTargets=[];
      renderBoard();checkPlayEnd();
      if(!playGame.game_over())setTimeout(doEngineMove,300);
    });
    el.promotionButtons.appendChild(btn);
  });
  el.promotionPicker.classList.remove('hidden');
}

/* ================================================================ AUDIO */
let _actx=null;
function actx(){
  if(!_actx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)_actx=new AC();}
  if(_actx&&_actx.state==='suspended')_actx.resume();
  return _actx;
}
function tone(f,d,type,g,delay){
  try{const c=actx();if(!c)return;const o=c.createOscillator(),gn=c.createGain();
  o.type=type||'sine';o.frequency.value=f;const t0=c.currentTime+(delay||0);
  gn.gain.setValueAtTime(g||0.15,t0);gn.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  o.connect(gn);gn.connect(c.destination);o.start(t0);o.stop(t0+d+0.03);}catch(e){}
}
function noise(d,g){
  try{const c=actx();if(!c)return;const sz=Math.floor(c.sampleRate*d),buf=c.createBuffer(1,sz,c.sampleRate),data=buf.getChannelData(0);
  for(let i=0;i<sz;i++)data[i]=(Math.random()*2-1)*(1-i/sz);
  const src=c.createBufferSource(),gn=c.createGain();src.buffer=buf;gn.gain.value=g||0.18;
  src.connect(gn);gn.connect(c.destination);src.start();}catch(e){}
}
function playMoveSound(opts){
  if(opts&&opts.isCapture){tone(210,.07,'square',.14,0);noise(.06,.15);}
  else tone(540,.055,'sine',.15,0);
  if(opts&&opts.isCheck)tone(900,.13,'triangle',.13,.06);
}
function playGameEndSound(){[523,659,784,1046].forEach((f,i)=>tone(f,.25,'sine',.14,i*.12));}

const LIMIT=20;

async function fetchChesscomList(username){
  const r=await fetch('https://api.chess.com/pub/player/'+encodeURIComponent(username.toLowerCase())+'/games/archives');
  if(!r.ok)throw new Error('User not found on Chess.com');
  const j=await r.json();
  if(!j.archives||!j.archives.length)throw new Error('No games found');
  const archives=j.archives.slice().reverse();
  const out=[];
  for(let i=0;i<archives.length&&i<12&&out.length<LIMIT;i++){
    const resp=await fetch(archives[i]);if(!resp.ok)continue;
    const jj=await resp.json();
    for(const g of(jj.games||[]).slice().reverse()){if(g.pgn)out.push(g.pgn);if(out.length>=LIMIT)break;}
  }
  if(!out.length)throw new Error('No games found');
  return out;
}

async function fetchLichessList(username){
  const r=await fetch('https://lichess.org/api/games/user/'+encodeURIComponent(username)+'?max='+LIMIT+'&pgnInJson=true',{headers:{Accept:'application/x-ndjson'}});
  if(!r.ok)throw new Error('User not found on Lichess');
  const text=await r.text();
  const out=[];
  text.split('\n').forEach(line=>{line=line.trim();if(!line)return;try{const o=JSON.parse(line);if(o&&o.pgn)out.push(o.pgn);}catch(e){}});
  if(!out.length)throw new Error('No games found');
  return out;
}

/* ================================================================ SAVE PGN */
function pgnResultTag(g){
  if(g.in_checkmate())return g.turn()==='w'?'0-1':'1-0';
  if(g.in_draw()||g.in_stalemate()||g.in_threefold_repetition()||g.insufficient_material())return'1/2-1/2';
  return'*';
}
function safeName(s){return String(s||'').trim().replace(/[^a-zA-Z0-9_-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,40)||'game';}

function buildPgnForDownload(){
  if(playMode&&playGame){
    const wl=humanColor==='w'?'You':'Stockfish',bl=humanColor==='w'?'Stockfish':'You';
    try{playGame.header('Event','Play vs Engine','Site','BuddyChess2','Date',new Date().toISOString().slice(0,10).replace(/-/g,'.'),'White',wl,'Black',bl,'Result',pgnResultTag(playGame));
    if(playStartFen&&playStartFen!==START_FEN)playGame.header('SetUp','1','FEN',playStartFen);}catch(e){}
    return playGame.pgn({max_width:0});
  }
  return gameMeta.rawPgn||null;
}

function buildFilename(){
  if(playMode)return safeName(humanColor==='w'?'You':'Stockfish')+'_vs_'+safeName(humanColor==='w'?'Stockfish':'You')+'_'+new Date().toISOString().slice(0,10)+'.pgn';
  const h=headers||{};
  let dt='';const d=gameMeta.endTime||deriveDateFromHeaders(h);if(d)try{dt=d.toISOString().slice(0,10);}catch(e){}
  return safeName(h.White||'White')+'_vs_'+safeName(h.Black||'Black')+(dt?'_'+dt:'')+'.pgn';
}

function downloadPgn(){
  const txt=buildPgnForDownload();if(!txt)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'application/x-chess-pgn'}));
  a.download=buildFilename();
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

  el.btnPrev .addEventListener('click',()=>{if(playMode||currentPly===0)return;currentPly--;renderBoard();renderMoveList();drawEvalGraph();});
  el.btnNext .addEventListener('click',()=>{if(playMode||currentPly>=positions.length-1)return;currentPly++;renderBoard();renderMoveList();drawEvalGraph();});
  el.btnLast .addEventListener('click',()=>{if(playMode)return;currentPly=positions.length-1;renderBoard();renderMoveList();drawEvalGraph();});
  el.btnFlip .addEventListener('click',()=>{flipped=!flipped;renderBoard();});
  el.btnFlip2.addEventListener('click',()=>{flipped=!flipped;renderBoard();});
  el.btnSavePgn    .addEventListener('click',downloadPgn);
  el.btnSavePgnPlay.addEventListener('click',downloadPgn);

  el.btnPlayEngine.addEventListener('click',()=>{
    const color=flipped?'b':'w';
    enterPlayMode(color, positions[currentPly]||START_FEN);
  });
  el.btnResetReview.addEventListener('click',()=>exitPlayMode(false));

  // Tabs
  ['import','review','moves'].forEach(n=>q('tabBtn-'+n).addEventListener('click',()=>switchTab(n)));

  // Import controls
  el.loadPgnBtn.addEventListener('click',()=>{
    const txt=el.pgnInput.value.trim();
    if(!txt){setImportStatus('Paste a PGN first.',true);return;}
    try{handleNewPgn(txt,{});setImportStatus('Game loaded!',false);}
    catch(e){setImportStatus('Error: '+e.message,true);}
  });
  el.fetchChesscomBtn.addEventListener('click',()=>{
    const u=el.chesscomUsername.value.trim();
    if(!u){setImportStatus('Enter a username.',true);return;}
    fetchAndShow('chesscom',u);
  });
  el.fetchLichessBtn.addEventListener('click',()=>{
    const u=el.lichessUsername.value.trim();
    if(!u){setImportStatus('Enter a username.',true);return;}
    fetchAndShow('lichess',u);
  });
  el.cancelAnalysisBtn.addEventListener('click',()=>{analysisCancelled=true;});
  el.reanalyzeBtn.addEventListener('click',()=>{
    analysisResults=new Array(positions.length).fill(null);
    classCounts=null; gameAccuracy={w:null,b:null};
    renderClassBreakdown(); renderAccuracy();
    runAnalysis();
  });

  // Eval graph click → jump to that move
  el.evalGraph.addEventListener('click',e=>{
    if(playMode||positions.length<2)return;
    const rect=el.evalGraph.getBoundingClientRect();
    currentPly=Math.round(((e.clientX-rect.left)/rect.width)*(positions.length-1));
    renderBoard();renderMoveList();drawEvalGraph();
  });

  // Keyboard navigation
  document.addEventListener('keydown',e=>{
    if(playMode)return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='ArrowLeft' &&currentPly>0)              {currentPly--;renderBoard();renderMoveList();drawEvalGraph();}
    if(e.key==='ArrowRight'&&currentPly<positions.length-1){currentPly++;renderBoard();renderMoveList();drawEvalGraph();}
  });

  renderBoard();
}

document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
</html>

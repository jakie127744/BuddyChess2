<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuddyChess2 - Play Chess with AI Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>BuddyChess2</h1>
            <div class="controls">
                <select id="piece-set-selector">
                    <option value="burnett">Chess Burnett</option>
                    <option value="merida">Merida</option>
                    <option value="alpha">Alpha</option>
                    <option value="neo">Neo</option>
                </select>
                <button id="flip-board">Flip Board</button>
                <button id="undo-move">Undo</button>
                <button id="new-game">New Game</button>
            </div>
        </header>

        <div class="game-area">
            <div class="evaluation-panel">
                <div class="eval-bar-container">
                    <div id="eval-bar-fill" class="eval-bar-fill"></div>
                </div>
                <div id="eval-text" class="eval-text">0.0</div>
            </div>

            <div class="board-container">
                <div id="chessboard" class="chessboard"></div>
            </div>

            <div class="info-panel">
                <div class="status">
                    <h3>Game Status</h3>
                    <p id="status-text">White to move</p>
                </div>
                
                <div class="captured-pieces">
                    <h3>Captured Pieces</h3>
                    <div id="captured-white" class="captured-row"></div>
                    <div id="captured-black" class="captured-row"></div>
                </div>

                <div class="move-history">
                    <h3>Move History</h3>
                    <div id="move-list" class="move-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BuddyChess2 - Analysis</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121315; color: #e4e4e7; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #18181b; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
  
  /* Board */
  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 12px 36px -8px rgba(0,0,0,.7);
    user-select: none;
    position: relative;
  }
  .square { position: relative; display: flex; align-items: center; justify-content: center; }
  .square.light { background: #ebecd0; }
  .square.dark { background: #6f9152; }
  .square.highlight { background-color: rgba(255, 255, 0, 0.4) !important; }
  .square.selected { box-shadow: inset 0 0 0 3px rgba(56,189,248,0.8); }
  .square.check { background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, transparent 70%) !important; }
  
  /* Coordinates */
  .coord { position: absolute; font-size: 10px; font-weight: bold; pointer-events: none; }
  .coord.file { bottom: 2px; left: 2px; }
  .coord.rank { top: 2px; right: 2px; }
  .light .coord { color: #6f9152; }
  .dark .coord { color: #ebecd0; }

  /* Pieces */
  .piece-img {
    width: 90%;
    height: 90%;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
    transition: transform 0.1s;
  }
  .square:hover .piece-img { transform: scale(1.05); }

  /* Eval Bar */
  .eval-container {
    width: 30px;
    background: #27272a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column-reverse;
    border: 1px solid #3f3f46;
  }
  .eval-white {
    width: 100%;
    background: #f5f5f4;
    height: 50%;
    transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .eval-label {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 10px;
    font-weight: bold;
    color: #000;
    bottom: 2px;
    pointer-events: none;
    z-index: 10;
  }
  .eval-label.top { top: 2px; bottom: auto; color: #fff; }

  /* Controls */
  .btn { padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; }
  .btn-primary { background: #4ade80; color: #0f172a; }
  .btn-primary:hover { background: #22c55e; }
  .btn-secondary { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; }
  .btn-secondary:hover { background: #3f3f46; }
  .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #27272a; border-radius: 6px; border: 1px solid #3f3f46; color: #e4e4e7; cursor: pointer; }
  .icon-btn:hover { background: #3f3f46; }
  .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Tabs */
  .tab-btn { padding: 8px 16px; border-bottom: 2px solid transparent; color: #a1a1aa; cursor: pointer; }
  .tab-btn.active { color: #fff; border-bottom-color: #4ade80; }
  
  /* Move List */
  .move-row { display: grid; grid-template-columns: 40px 1fr 1fr; gap: 4px; padding: 4px; border-bottom: 1px solid #27272a; }
  .move-item { padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .move-item:hover { background: #27272a; }
  .move-item.active { background: #3f3f46; color: #4ade80; font-weight: bold; }
  
  /* Spinner */
  .spinner { border: 2px solid rgba(255,255,255,0.1); border-top-color: #4ade80; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header class="h-14 border-b border-zinc-800 bg-[#16171a] flex items-center justify-between px-4 shrink-0">
  <div class="flex items-center gap-3">
    <span class="text-xl">♟️</span>
    <h1 class="font-bold text-lg">BuddyChess2</h1>
  </div>
  <div class="flex items-center gap-2 text-xs">
    <div id="engineStatus" class="flex items-center gap-2 px-3 py-1 rounded-full bg-zinc-800 border border-zinc-700">
      <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
      <span id="engineText">Loading Stockfish 16...</span>
    </div>
  </div>
</header>

<!-- Main Layout -->
<div class="flex-1 flex overflow-hidden">
  
  <!-- Left Column: Engine & Info -->
  <div class="w-80 bg-[#18181b] border-r border-zinc-800 flex flex-col shrink-0 hidden lg:flex">
    <div class="p-4 border-b border-zinc-800">
      <h2 class="text-xs font-bold uppercase text-zinc-500 mb-2">Evaluation</h2>
      <div id="evalText" class="text-2xl font-mono font-bold text-center mb-2">0.0</div>
      <div id="bestMoveText" class="text-xs text-center text-zinc-400 h-4">-</div>
    </div>
    <div class="p-4 flex-1 overflow-y-auto">
      <h2 class="text-xs font-bold uppercase text-zinc-500 mb-2">Game Info</h2>
      <div id="gameInfo" class="text-sm space-y-2 text-zinc-300">
        <p>Import a game to see details.</p>
      </div>
    </div>
  </div>

  <!-- Center Column: Board -->
  <div class="flex-1 flex flex-col items-center justify-center bg-[#121315] p-4 relative">
    
    <!-- Top Player -->
    <div class="w-full max-w-[600px] flex justify-between items-center mb-2 px-2">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-zinc-700 flex items-center justify-center">⚫</div>
        <span id="blackName" class="font-semibold">Black</span>
      </div>
      <div id="blackCaptured" class="flex gap-1 h-6"></div>
    </div>

    <!-- Board Container -->
    <div class="relative w-full max-w-[600px] aspect-square">
      <div class="absolute left-[-40px] top-0 bottom-0 flex flex-col justify-around py-2 text-zinc-500 font-bold text-sm hidden md:flex">
        <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
      </div>
      
      <div class="flex h-full gap-2">
        <!-- Eval Bar -->
        <div class="eval-container hidden md:flex">
          <div id="evalBarWhite" class="eval-white"></div>
          <span id="evalLabel" class="eval-label">0.0</span>
        </div>
        <!-- Chess Board -->
        <div id="board" class="flex-1 bg-zinc-800"></div>
      </div>

      <div class="absolute bottom-[-40px] left-0 right-0 flex justify-around px-2 text-zinc-500 font-bold text-sm hidden md:flex">
        <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
      </div>
    </div>

    <!-- Bottom Player -->
    <div class="w-full max-w-[600px] flex justify-between items-center mt-2 px-2">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-zinc-200 flex items-center justify-center text-black">⚪</div>
        <span id="whiteName" class="font-semibold">White</span>
      </div>
      <div id="whiteCaptured" class="flex gap-1 h-6"></div>
    </div>

    <!-- Controls -->
    <div class="mt-6 flex gap-2 flex-wrap justify-center">
      <button class="icon-btn" onclick="goToStart()" title="Start">⏮</button>
      <button class="icon-btn" onclick="prevMove()" title="Previous">◀</button>
      <button class="icon-btn" onclick="nextMove()" title="Next">▶</button>
      <button class="icon-btn" onclick="goToEnd()" title="End">⏭</button>
      <button class="icon-btn" onclick="flipBoard()" title="Flip">⇅</button>
      <button class="btn btn-primary ml-2" onclick="enterPlayMode()">Play vs Engine</button>
    </div>
  </div>

  <!-- Right Column: Moves & Import -->
  <div class="w-80 bg-[#18181b] border-l border-zinc-800 flex flex-col shrink-0">
    <div class="flex border-b border-zinc-800">
      <button class="tab-btn active flex-1" onclick="switchTab('moves')">Moves</button>
      <button class="tab-btn flex-1" onclick="switchTab('import')">Import</button>
    </div>

    <!-- Moves Tab -->
    <div id="tab-moves" class="flex-1 overflow-y-auto p-2">
      <div id="moveList" class="space-y-1"></div>
    </div>

    <!-- Import Tab -->
    <div id="tab-import" class="hidden flex-1 overflow-y-auto p-4 space-y-4">
      <div>
        <label class="text-xs font-bold text-zinc-500 uppercase">Chess.com User</label>
        <div class="flex gap-2 mt-1">
          <input type="text" id="chessUser" class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 text-sm outline-none focus:border-green-500" placeholder="Username">
          <button class="btn btn-secondary text-xs" onclick="fetchChessCom()">Fetch</button>
        </div>
      </div>
      <div>
        <label class="text-xs font-bold text-zinc-500 uppercase">Lichess User</label>
        <div class="flex gap-2 mt-1">
          <input type="text" id="lichessUser" class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 text-sm outline-none focus:border-green-500" placeholder="Username">
          <button class="btn btn-secondary text-xs" onclick="fetchLichess()">Fetch</button>
        </div>
      </div>
      <div class="border-t border-zinc-800 pt-4">
        <label class="text-xs font-bold text-zinc-500 uppercase">Paste PGN</label>
        <textarea id="pgnInput" class="w-full h-32 bg-zinc-900 border border-zinc-700 rounded p-2 text-xs font-mono mt-1 outline-none focus:border-green-500" placeholder="[Event ...]"></textarea>
        <button class="btn btn-primary w-full mt-2" onclick="loadPgnDirect()">Load PGN</button>
      </div>
      <div id="importMsg" class="text-xs text-center"></div>
    </div>
  </div>
</div>

<script>
/** 
 * CONFIGURATION & ASSETS 
 */
const PIECE_SETS = {
  w: { k: 'king', q: 'queen', r: 'rook', b: 'bishop', n: 'knight', p: 'pawn' },
  b: { k: 'king', q: 'queen', r: 'rook', b: 'bishop', n: 'knight', p: 'pawn' }
};
// Using Wikimedia Commons stable SVG links
const getPieceUrl = (color, type) => {
  const c = color === 'w' ? 'l' : 'd'; // light or dark
  const t = PIECE_SETS[color][type];
  // Standard Wikipedia SVG naming convention
  return `https://upload.wikimedia.org/wikipedia/commons/thumb/${c === 'l' ? '4/42' : 'c/c7'}/Chess_${t}${c === 'l' ? 'lt45' : 'dt45'}.svg/120px-Chess_${t}${c === 'l' ? 'lt45' : 'dt45'}.svg.png`;
  // Fallback to pure SVG if PNG fails (handled in render)
};

// Better reliable URLs for pieces (Wikimedia Commons Direct SVG)
const PIECE_URLS = {
  'w': {
    'k': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
    'q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
    'r': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
    'b': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
    'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_nlt45.svg',
    'p': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg'
  },
  'b': {
    'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
    'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
    'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
    'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
    'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ed/Chess_ndt45.svg',
    'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg'
  }
};

/**
 * STATE
 */
let game = new Chess();
let history = []; // Full history of moves
let currentPly = 0;
let isFlipped = false;
let engineWorker = null;
let isEngineReady = false;
let analysisQueue = Promise.resolve();
let playMode = false;
let playerColor = 'w';

/**
 * ENGINE INITIALIZATION (Stockfish 16 from Lichess CDN)
 */
async function initEngine() {
  const statusDot = document.querySelector('#engineStatus span:first-child');
  const statusText = document.getElementById('engineText');

  try {
    // 1. Fetch the script content from Lichess CDN
    // Using the specific NNUE WASM bundle used by Lichess
    const response = await fetch('https://lichess1.org/assets/dist/engine/stockfish-nnue-16.wasm.js');
    if (!response.ok) throw new Error('Failed to fetch engine');
    const scriptContent = await response.text();

    // 2. Create a Blob to bypass CORS/COOP issues with Workers
    const blob = new Blob([scriptContent], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);

    // 3. Initialize Worker
    engineWorker = new Worker(workerUrl);
    
    engineWorker.onmessage = function(e) {
      const msg = e.data;
      if (msg === 'uciok') {
        isEngineReady = true;
        statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
        statusText.textContent = 'Stockfish 16 (NNUE) Ready';
        engineWorker.postMessage('isready');
      }
      if (msg === 'readyok' && !playMode) {
        // Trigger analysis for current position if idle
        analyzePosition();
      }
      if (typeof msg === 'string' && msg.startsWith('info')) {
        parseEval(msg);
      }
      if (typeof msg === 'string' && msg.startsWith('bestmove') && playMode) {
        handleEngineMove(msg);
      }
    };

    engineWorker.onerror = (err) => {
      console.error('Worker error:', err);
      statusText.textContent = 'Error loading engine';
      statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
    };

    // Start UCI protocol
    engineWorker.postMessage('uci');

  } catch (err) {
    console.error('Engine init failed:', err);
    statusText.textContent = 'Engine Failed (Check Console)';
    statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
  }
}

function analyzePosition() {
  if (!isEngineReady || !engineWorker || playMode) return;
  engineWorker.postMessage('position fen ' + game.fen());
  engineWorker.postMessage('go depth 18');
}

let currentEval = 0; // Centipawns
function parseEval(msg) {
  // Extract CP or Mate score
  const cpMatch = msg.match(/score cp (-?\d+)/);
  const mateMatch = msg.match(/score mate (-?\d+)/);
  const pvMatch = msg.match(/ pv (.+?)(?: depth |$)/);
  
  let score = 0;
  let display = '0.0';

  if (mateMatch) {
    const moves = parseInt(mateMatch[1]);
    score = moves > 0 ? 10000 : -10000;
    display = (moves > 0 ? '+' : '') + 'M' + Math.abs(moves);
  } else if (cpMatch) {
    score = parseInt(cpMatch[1]);
    // Adjust score based on whose turn it is (positive = white advantage)
    if (game.turn() === 'b') score = -score;
    display = (score >= 0 ? '+' : '') + (score / 100).toFixed(2);
  } else {
    return;
  }

  currentEval = score;
  updateEvalUI(display, score);
  
  if (pvMatch && document.getElementById('bestMoveText')) {
    document.getElementById('bestMoveText').textContent = 'Best: ' + pvMatch[1].split(' ')[0];
  }
}

function updateEvalUI(textDisplay, cpScore) {
  const label = document.getElementById('evalLabel');
  const bar = document.getElementById('evalBarWhite');
  const text = document.getElementById('evalText');
  
  if (text) text.textContent = textDisplay;
  if (label) label.textContent = textDisplay;

  // Calculate percentage (clamp between 2% and 98%)
  // Formula: 1 / (1 + e^(-0.00368208 * cp))
  let percent = 50;
  if (Math.abs(cpScore) < 1000) {
    percent = 100 / (1 + Math.exp(-0.00368208 * cpScore));
  } else {
    percent = cpScore > 0 ? 98 : 2;
  }
  
  if (bar) bar.style.height = `${percent}%`;
  if (label) {
    label.classList.toggle('top', percent > 50);
    label.style.color = percent > 50 ? '#fff' : '#000';
  }
}

/**
 * BOARD RENDERING
 */
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  
  const fen = game.fen();
  const board = fen.split(' ')[0].split('/');
  const lastMove = history[currentPly - 1]; // Simple tracking
  
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      // Handle ranks/files based on flip
      const row = isFlipped ? 7 - r : r;
      const col = isFlipped ? 7 - c : c;
      
      const squareCode = String.fromCharCode(97 + col) + (8 - row);
      const pieceChar = board[row][c];
      
      const sqDiv = document.createElement('div');
      sqDiv.className = `square ${(row + c) % 2 === 0 ? 'light' : 'dark'}`;
      sqDiv.dataset.square = squareCode;
      sqDiv.onclick = () => onSquareClick(squareCode);

      // Highlights
      if (lastMove && (lastMove.from === squareCode || lastMove.to === squareCode)) {
        sqDiv.classList.add('highlight');
      }
      
      // King in Check
      if (pieceChar.toLowerCase() === 'k' && game.in_check() && pieceChar === (game.turn() === 'w' ? 'K' : 'k')) {
        sqDiv.classList.add('check');
      }

      // Coordinates
      if (c === 0) {
        const rank = document.createElement('span');
        rank.className = `coord rank ${((row + c) % 2 === 0) ? 'light' : 'dark'}`; // Simplified logic
        rank.textContent = 8 - row;
        sqDiv.appendChild(rank);
      }
      if (c === 7) { // Actually file labels usually bottom, but simplified here
         // Handled by CSS absolute positioning outside grid for cleaner look
      }

      // Piece
      if (pieceChar !== '.') {
        const color = pieceChar === pieceChar.toUpperCase() ? 'w' : 'b';
        const type = pieceChar.toLowerCase();
        const img = document.createElement('img');
        img.src = PIECE_URLS[color][type];
        img.className = 'piece-img';
        img.alt = type;
        img.draggable = false;
        
        // Fallback if image fails (rare with Wikimedia)
        img.onerror = function() {
          this.style.display = 'none';
          sqDiv.textContent = type.toUpperCase(); // Fallback text
          sqDiv.style.fontSize = '24px';
          sqDiv.style.fontWeight = 'bold';
          sqDiv.style.color = color === 'w' ? '#fff' : '#000';
        };
        
        sqDiv.appendChild(img);
      }

      boardEl.appendChild(sqDiv);
    }
  }
  updateCaptured();
  renderMoveList();
}

function updateCaptured() {
  // Simple logic: Compare start material vs current board
  // For brevity, just placeholders. Real implementation tracks move history captures.
  const wCap = document.getElementById('whiteCaptured');
  const bCap = document.getElementById('blackCaptured');
  wCap.innerHTML = ''; 
  bCap.innerHTML = '';
  // Implementation omitted for brevity, but structure is there
}

/**
 * GAME LOGIC
 */
function onSquareClick(square) {
  if (playMode && game.turn() !== playerColor) return;

  const selected = document.querySelector('.selected');
  if (selected) {
    const from = selected.dataset.square;
    if (from === square) {
      selected.classList.remove('selected');
      return;
    }
    
    // Try move
    const move = game.move({ from, to: square, promotion: 'q' });
    if (move) {
      recordMove(move);
      renderBoard();
      if (playMode) {
        setTimeout(makeEngineMove, 500);
      } else {
        analyzePosition();
      }
    } else {
      // If invalid, check if clicking another own piece
      const piece = game.get(square);
      if (piece && piece.color === game.turn()) {
        selected.classList.remove('selected');
        document.querySelector(`[data-square="${square}"]`).classList.add('selected');
      } else {
        selected.classList.remove('selected');
      }
    }
  } else {
    const piece = game.get(square);
    if (piece && piece.color === game.turn()) {
      document.querySelector(`[data-square="${square}"]`).classList.add('selected');
    }
  }
}

function recordMove(move) {
  history.push(move);
  currentPly = history.length;
  updateGameInfo();
}

function makeEngineMove() {
  if (!engineWorker) return;
  document.getElementById('engineText').textContent = 'Thinking...';
  engineWorker.postMessage('position fen ' + game.fen());
  engineWorker.postMessage('go depth 15');
}

function handleEngineMove(msg) {
  const parts = msg.split(' ');
  const bestMove = parts[1];
  if (!bestMove || bestMove === '(none)') return;

  const from = bestMove.slice(0, 2);
  const to = bestMove.slice(2, 4);
  const promo = bestMove.length > 4 ? bestMove.slice(4, 5) : undefined;

  const move = game.move({ from, to, promotion: promo });
  if (move) {
    recordMove(move);
    renderBoard();
    document.getElementById('engineText').textContent = 'Stockfish 16 (NNUE) Ready';
    analyzePosition();
  }
}

function enterPlayMode() {
  playMode = true;
  playerColor = game.turn();
  alert(`Playing vs Engine. You are ${playerColor === 'w' ? 'White' : 'Black'}.`);
  if (playerColor === 'b') {
    makeEngineMove();
  }
}

/**
 * NAVIGATION & UI
 */
function goToStart() { currentPly = 0; resetGame(); }
function goToEnd() { currentPly = history.length; resetGame(); }
function prevMove() { if (currentPly > 0) { currentPly--; resetGame(); } }
function nextMove() { if (currentPly < history.length) { currentPly++; resetGame(); } }
function flipBoard() { isFlipped = !isFlipped; renderBoard(); }

function resetGame() {
  game = new Chess();
  history.forEach(m => game.move(m));
  // Undo extra moves if going back
  // Note: chess.js doesn't support direct jump easily without replaying
  // Re-implementing full replay for simplicity:
  game = new Chess();
  for(let i=0; i<currentPly; i++) {
    game.move(history[i]);
  }
  renderBoard();
  analyzePosition();
}

function renderMoveList() {
  const list = document.getElementById('moveList');
  list.innerHTML = '';
  const historyVerbose = game.history({ verbose: true });
  
  // We need to map our global history to the current game state
  // Simplified: Just show the moves up to currentPly
  // Since `game` is reconstructed, `game.history()` matches currentPly
  
  let html = '';
  for (let i = 0; i < historyVerbose.length; i += 2) {
    const num = (i/2) + 1;
    const w = historyVerbose[i];
    const b = historyVerbose[i+1];
    
    const isActiveW = i === currentPly - 1;
    const isActiveB = b && (i+1 === currentPly - 1);

    html += `<div class="move-row">
      <span class="text-zinc-500 text-sm self-center">${num}.</span>
      <div class="move-item ${isActiveW ? 'active' : ''}" onclick="jumpTo(${i+1})">${w.san}</div>
      <div class="move-item ${isActiveB ? 'active' : ''}" onclick="jumpTo(${i+2})">${b ? b.san : ''}</div>
    </div>`;
  }
  list.innerHTML = html;
}

function jumpTo(ply) {
  currentPly = ply;
  resetGame();
}

function updateGameInfo() {
  const info = document.getElementById('gameInfo');
  const header = game.header(); // Requires PGN load to be useful
  info.innerHTML = `
    <div><strong>Turn:</strong> ${game.turn() === 'w' ? 'White' : 'Black'}</div>
    <div><strong>Status:</strong> ${game.in_check() ? 'Check!' : 'Active'}</div>
    <div><strong>FEN:</strong> <span class="text-xs break-all">${game.fen()}</span></div>
  `;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(d => d.classList.add('hidden'));
  
  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
}

async function fetchChessCom() {
  const user = document.getElementById('chessUser').value.trim();
  const msg = document.getElementById('importMsg');
  if (!user) return;
  
  msg.textContent = 'Fetching...';
  try {
    // FIXED: Removed trailing space in URL
    const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
    if (!res.ok) throw new Error('User not found');
    const data = await res.json();
    if (!data.archives.length) throw new Error('No games found');
    
    // Get latest month
    const latest = data.archives[data.archives.length - 1];
    const gamesRes = await fetch(latest);
    const gamesData = await gamesRes.json();
    const lastGame = gamesData.games[gamesData.games.length - 1];
    
    loadPgn(lastGame.pgn);
    msg.textContent = 'Loaded latest game!';
  } catch (e) {
    msg.textContent = 'Error: ' + e.message;
  }
}

    // Lichess API games/user returns PGN in the body if Accept is text/plain, but we got JSON meta? 
    // Let's retry with simpler approach for Lichess:
    // Use the game ID from the first line if possible, or just load the PGN string if the API returned it.
    // Actually, standard `games/user` returns PGN lines if Accept is missing or */*.

    loadPgn(text);

function loadPgnDirect() {
  const txt = document.getElementById('pgnInput').value;
  if (txt) loadPgn(txt);
}

function loadPgn(pgn) {
  const success = game.load_pgn(pgn);
  if (success) {
    history = game.history({ verbose: true });
    currentPly = history.length;
    game.reset(); // Reset to start to replay properly
    resetGame();
    switchTab('moves');
    document.querySelector('.tab-btn').click(); // Switch visually
    updateGameInfo();
  } else {
    alert('Invalid PGN');
  }
}
